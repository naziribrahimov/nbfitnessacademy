<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB FITNESS | ELITE PERFORMANCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff003c; --blue: #00f7ff; --dark: #020202; --card: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: 'Rajdhani', sans-serif; margin: 0; overflow-x: hidden; }

        /* HERO SECTION - BAŞ MƏŞQÇİLƏR */
        .hero-coaches {
            display: flex; flex-wrap: wrap; height: 100vh; width: 100%;
            background: #000; position: relative; overflow: hidden;
        }
        .coach-side {
            flex: 1; min-width: 350px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end; padding: 40px;
            transition: 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .coach-side::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(transparent 30%, rgba(0,0,0,0.9) 90%); z-index: 2;
        }
        .coach-side:hover { flex: 1.3; }
        
        /* Şəkillərin Arxa Fonu */
        .nazir-bg { background: url('nazir.jpg') center top no-repeat; background-size: cover; border-right: 2px solid var(--red); }
        .arif-bg { background: url('arif.jpg') center top no-repeat; background-size: cover; border-left: 2px solid var(--blue); }

        .coach-content { position: relative; z-index: 3; }
        .coach-role { font-family: 'Orbitron'; font-size: 14px; letter-spacing: 5px; margin-bottom: 10px; }
        .nazir-role { color: var(--red); }
        .arif-role { color: var(--blue); }

        .coach-name { font-family: 'Orbitron'; font-size: clamp(30px, 5vw, 60px); font-weight: 900; margin: 0; text-transform: uppercase; line-height: 1; }
        
        /* Əlaqə Düymələri Şəkil Üzərində */
        .coach-btn {
            display: inline-block; margin-top: 20px; padding: 15px 35px;
            text-decoration: none; font-family: 'Orbitron'; font-weight: bold;
            border-radius: 50px; transition: 0.3s; font-size: 12px;
        }
        .nazir-btn { background: var(--red); color: white; box-shadow: 0 0 20px var(--red); }
        .arif-btn { background: var(--blue); color: black; box-shadow: 0 0 20px var(--blue); }

        /* ENERJİ BAR & DASHBOARD */
        .container { max-width: 1200px; margin: 0 auto; padding: 60px 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid #1a1a1a; padding: 25px; border-radius: 15px; transition: 0.4s; }
        .card:hover { border-color: var(--red); box-shadow: 0 0 30px rgba(255, 0, 60, 0.1); }
        
        /* MODERN INPUTLAR */
        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; font-family: 'Orbitron'; font-size: 13px; }
        .calc-btn { width: 100%; padding: 15px; border: none; border-radius: 5px; font-family: 'Orbitron'; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }

        /* WHATSAPP FLOAT */
        .ws-main {
            position: fixed; bottom: 30px; right: 30px; background: #25d366;
            width: 65px; height: 65px; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; z-index: 1000;
            box-shadow: 0 0 20px #25d366; cursor: pointer;
        }

        .energy-hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 20px; }

        @media (max-width: 768px) {
            .hero-coaches { height: auto; }
            .coach-side { height: 80vh; }
        }
    </style>
</head>
<body>

<div class="ws-main" onclick="sendWhatsApp('General')">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="35">
</div>

<div class="energy-hud">
    <div style="font-family: 'Orbitron'; color: var(--blue); border: 1px solid var(--blue); padding: 5px 15px; border-radius: 50px; font-size: 10px;">
        ENERGY: <span id="e-val">0%</span>
    </div>
</div>

<div class="hero-coaches">
    <div class="coach-side nazir-bg">
        <div class="coach-content">
            <div class="coach-role nazir-role">STRENGTH & POWER</div>
            <h2 class="coach-name">NAZİR<br>İBRAHİMOV</h2>
            <a href="tel:0702946819" class="coach-btn nazir-btn">📞 070-294-68-19</a>
        </div>
    </div>

    <div class="coach-side arif-bg">
        <div class="coach-content">
            <div class="coach-role arif-role">AESTHETIC & POSING</div>
            <h2 class="coach-name">ARİF<br>BAĞIROV</h2>
            <a href="tel:0514102531" class="coach-btn arif-btn">📞 051-410-25-31</a>
        </div>
    </div>
</div>

<div class="container">
    <div class="grid">
        <div class="card">
            <h3 style="font-family: 'Orbitron'; color: var(--red);">📈 3 AY SONRA</h3>
            <p style="color: #666; font-size: 14px;">Mövcud ölçülərinizi daxil edin:</p>
            <input type="number" id="arm" placeholder="Qol ölçüsü (sm)">
            <input type="number" id="waist" placeholder="Bel ölçüsü (sm)">
            <button class="calc-btn nazir-btn" onclick="predict()">GƏLƏCƏYİ SKAN ET</button>
            <div id="p-res" style="margin-top: 15px; color: var(--gold); font-family: 'Orbitron'; font-size: 14px;"></div>
        </div>

        <div class="card">
            <h3 style="font-family: 'Orbitron'; color: var(--blue);">🧬 GENETİK ANALİZ</h3>
            <select id="s1">
                <option value="1">Nazik biləklər</option>
                <option value="2">Orta/Güclü biləklər</option>
                <option value="3">Geniş biləklər</option>
            </select>
            <select id="s2">
                <option value="1">Çətin çəki alıram</option>
                <option value="2">Asan əzələ yığıram</option>
                <option value="3">Tez piylənirəm</option>
            </select>
            <button class="calc-btn arif-btn" onclick="checkGen()">GENETİKANI AÇ</button>
            <div id="g-res" style="margin-top: 15px; color: var(--blue); font-size: 14px;"></div>
        </div>

        <div class="card">
            <h3 style="font-family: 'Orbitron'; color: var(--gold);">⚡ ENERGY BAR</h3>
            <select id="sleep" onchange="upEn()">
                <option value="40">Yuxu: 5-6 saat</option>
                <option value="100">Yuxu: 8+ saat</option>
            </select>
            <select id="food" onchange="upEn()">
                <option value="30">Yemək: Qeyri-sağlam</option>
                <option value="100">Yemək: Proteinli</option>
            </select>
            <p style="font-size: 12px; color: #444; margin-top: 10px;">Batareya yuxarıda yenilənir ↑</p>
        </div>
    </div>

    <div style="text-align: center; margin-top: 80px;">
        <h2 style="font-family: 'Orbitron'; letter-spacing: 5px;">HAZIRSAN?</h2>
        <button class="calc-btn nazir-btn" style="width: auto; padding: 20px 60px;" onclick="sendWhatsApp('Elite Training')">START NOW (WHATSAPP)</button>
    </div>
</div>

<script>
    function predict() {
        let a = parseFloat(document.getElementById('arm').value);
        if(a) document.getElementById('p-res').innerHTML = `TƏXMİNİ: ${a+3.5}sm <br> <small>Nazir bəylə 90 günə!</small>`;
    }

    function checkGen() {
        let s = document.getElementById('s1').value;
        let res = s == "1" ? "EKTOMORF" : (s == "2" ? "MEZOMORF" : "ENDOMORF");
        document.getElementById('g-res').innerText = "SƏNİN TİPİN: " + res;
    }

    function upEn() {
        let s = parseInt(document.getElementById('sleep').value);
        let f = parseInt(document.getElementById('food').value);
        document.getElementById('e-val').innerText = ((s+f)/2) + "%";
    }

    function sendWhatsApp(type) {
        let phone = "994702946819";
        let msg = `Salam Nazir bəy! Mən saytınızdan gəlirəm. ${type} proqramı ilə limitləri aşmağa hazıram!`;
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>

<footer style="text-align: center; padding: 50px; color: #222; font-family: 'Orbitron'; font-size: 10px; letter-spacing: 3px;">
    NB FITNESS ACADEMY | OFFICIAL ELITE SYSTEM 2026
</footer>

</body>
</html>
