<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NB FITNESS APP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff003c; --blue: #00f7ff; --gold: #ffbd39; --dark: #000000; --card: #111; }
        
        body { 
            background: var(--dark); color: white; font-family: 'Montserrat', sans-serif; 
            margin: 0; padding: 0; overflow-x: hidden; -webkit-tap-highlight-color: transparent;
        }

        /* TƏTBİQİN ÜSTÜ (STATUS BAR) */
        .app-header {
            position: fixed; top: 0; width: 100%; height: 60px; background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
            border-bottom: 1px solid #222; backdrop-filter: blur(10px);
        }
        .app-header h1 { font-family: 'Orbitron'; font-size: 18px; letter-spacing: 3px; margin: 0; }
        .app-header span { color: var(--red); }

        /* AŞAĞI NAVİQASİYA (BOTTOM NAV) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 70px; background: #080808;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 1000; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item { text-align: center; color: #555; text-decoration: none; font-size: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--red); }
        .nav-icon { font-size: 20px; display: block; margin-bottom: 5px; }

        /* SƏHİFƏLƏR */
        .page { display: none; padding: 80px 20px 100px; min-height: 100vh; box-sizing: border-box; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ANA SƏHİFƏ - MƏŞQÇİLƏR */
        .coach-card { 
            position: relative; width: 100%; height: 75vh; border-radius: 20px; 
            overflow: hidden; margin-bottom: 20px; border: 1px solid #222;
        }
        .coach-card img { width: 100%; height: 100%; object-fit: cover; }
        .nazir-img { object-position: center top; }
        .arif-img { object-position: center 15% !important; }

        .overlay {
            position: absolute; bottom: 0; width: 100%; padding: 30px;
            background: linear-gradient(transparent, rgba(0,0,0,1) 85%); box-sizing: border-box;
        }
        .coach-name { font-family: 'Orbitron'; font-size: 28px; margin: 5px 0; text-transform: uppercase; }
        
        .btn-ws { 
            display: block; width: 100%; padding: 15px; text-align: center; border-radius: 10px;
            text-decoration: none; font-family: 'Orbitron'; font-weight: bold; font-size: 12px; margin-top: 15px;
        }
        .n-btn { background: var(--red); color: white; }
        .a-btn { background: var(--blue); color: black; }

        /* DASHBOARD ELEMENTLƏRİ */
        .card { background: var(--card); border-radius: 15px; padding: 25px; margin-bottom: 20px; border: 1px solid #1a1a1a; }
        h3 { font-family: 'Orbitron'; font-size: 14px; color: var(--gold); margin-top: 0; margin-bottom: 20px; border-left: 3px solid var(--red); padding-left: 10px; }

        input, select { 
            width: 100%; padding: 15px; margin-bottom: 15px; background: #000; 
            border: 1px solid #333; color: white; border-radius: 10px; font-family: 'Orbitron'; box-sizing: border-box;
        }
        .btn-action { 
            width: 100%; padding: 16px; background: var(--red); border: none; 
            color: white; border-radius: 10px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer;
        }

        .res-box { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.5); border-radius: 10px; border-left: 3px solid var(--blue); font-size: 14px; line-height: 1.6; }

    </style>
</head>
<body>

    <div class="app-header">
        <h1>NB <span>FITNESS</span></h1>
    </div>

    <div id="home" class="page active">
        <div class="coach-card">
            <img src="nazir.jpg" class="nazir-img" alt="Nazir">
            <div class="overlay">
                <div style="font-family:'Orbitron'; color:var(--red); font-size:10px;">HEAD COACH</div>
                <h2 class="coach-name">NAZİR İBRAHİMOV</h2>
                <a onclick="contactWS('Nazir', '994702946819')" class="btn-ws n-btn">📲 WHATSAPP İLƏ YAZ</a>
            </div>
        </div>
        <div class="coach-card">
            <img src="arif.jpg" class="arif-img" alt="Arif">
            <div class="overlay">
                <div style="font-family:'Orbitron'; color:var(--blue); font-size:10px;">HEAD COACH</div>
                <h2 class="coach-name">ARİF BAĞIROV</h2>
                <a onclick="contactWS('Arif', '994514102531')" class="btn-ws a-btn">📲 WHATSAPP İLƏ YAZ</a>
            </div>
        </div>
    </div>

    <div id="analyze" class="page">
        <div class="card">
            <h3>📊 ELITE ANALYZER</h3>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="age" placeholder="YAŞ">
                <input type="number" id="height" placeholder="BOY">
            </div>
            <input type="number" id="weight" placeholder="ÇƏKİ (KQ)">
            <button class="btn-action" onclick="fullAnalyze()">ANALİZİ BAŞLAT</button>
            <div id="anal-res" class="res-box">Status bura çıxacaq...</div>
        </div>

        <div class="card">
            <h3>📈 90 GÜNLÜK İNKİŞAF</h3>
            <input type="number" id="arm" placeholder="CARİ QOL (SM)">
            <button class="btn-action" onclick="predict()" style="background:var(--blue); color:black;">TƏXMİNİ GÖR</button>
            <div id="prog-res" class="res-box"></div>
        </div>
    </div>

    <div id="method" class="page">
        <div class="card">
            <h3>🔍 ƏZƏLƏ SKANERİ</h3>
            <select id="muscle">
                <option value="sinə">SİNƏ</option>
                <option value="ayaq">AYAQ</option>
                <option value="qol">QOL</option>
            </select>
            <button class="btn-action" onclick="scanM()">SKAN ET</button>
            <div id="m-res" class="res-box"></div>
        </div>

        <div class="card">
            <h3>🍗 PROTEİN REHBERİ</h3>
            <input type="number" id="pw" placeholder="ÇƏKİNİZ (KQ)">
            <button class="btn-action" onclick="calcP()">HESABLA</button>
            <div id="p-res" class="res-box"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('home', this)">
            <span class="nav-icon">🏠</span>
            ANA SƏHİFƏ
        </div>
        <div class="nav-item" onclick="showPage('analyze', this)">
            <span class="nav-icon">📊</span>
            ANALİZ
        </div>
        <div class="nav-item" onclick="showPage('method', this)">
            <span class="nav-icon">💪</span>
            METOD
        </div>
    </div>

    <script>
        // Səhifələr arası keçid
        function showPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
            
            window.scrollTo(0, 0);
        }

        // WhatsApp Hazır Mesaj
        function contactWS(coach, phone) {
            let msg = `Salam ${coach} bəy, mən tətbiqdən gəlirəm. Məşqlərə başlamaq istəyirəm!`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function fullAnalyze() {
            let age = document.getElementById('age').value;
            let h = document.getElementById('height').value / 100;
            let w = document.getElementById('weight').value;
            if(age && h && w) {
                let bmi = (w / (h * h)).toFixed(1);
                let ideal = (22.5 * h * h).toFixed(0);
                document.getElementById('anal-res').innerHTML = `BMI: <b>${bmi}</b><br>İDEAL ÇƏKİ: <b>${ideal} KQ</b><br>Nazir ilə hədəfə çat!`;
            }
        }

        function predict() {
            let a = document.getElementById('arm').value;
            if(a) document.getElementById('prog-res').innerHTML = `90 GÜN SONRA: <b>${parseFloat(a) + 3.5} SM</b>`;
        }

        function scanM() {
            const d = { 'sinə': 'Bench Press: Barı yavaş endir, partlayışla qaldır.', 'ayaq': 'Squat: Beli düz tut, tam otur.', 'qol': 'Bicep Curl: Yuxarıda 1 saniyə sıxılmanı hiss et.' };
            document.getElementById('m-res').innerHTML = d[document.getElementById('muscle').value];
        }

        function calcP() {
            let w = document.getElementById('pw').value;
            if(w) document.getElementById('p-res').innerHTML = `GÜNDƏLİK: <b>${w*2}q Protein</b>`;
        }
    </script>
</body>
</html>
