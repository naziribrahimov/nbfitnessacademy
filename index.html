<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB FITNESS ACADEMY</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --red: #bc0000; --blue: #007bff; --dark: #000000; --gray: #111111; }
        
        body { background: var(--dark); color: white; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }
        h1, h2, h3 { font-family: 'Oswald', sans-serif; text-transform: uppercase; margin: 0; }

        /* HEADER */
        header { padding: 40px 20px; text-align: center; border-bottom: 2px solid var(--red); background: #000; }
        header h1 { font-size: 40px; letter-spacing: 3px; }
        header h1 span { color: var(--red); }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* MƏŞQÇİLƏR - TAM BƏDƏN GÖRÜNÜŞÜ */
        .coach-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 40px; margin-bottom: 60px; }
        .coach-card { background: var(--gray); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; text-align: center; }
        .coach-card:hover { border-color: var(--red); transform: translateY(-5px); }
        
        /* Şəkil konteyneri - Bədənin tam görünməsi üçün */
        .img-container { width: 100%; height: 750px; overflow: hidden; background: #0a0a0a; }
        .coach-img { width: 100%; height: 100%; object-fit: contain; background-position: top; }
        
        .coach-info { padding: 30px; }
        .coach-info h2 { font-size: 30px; margin-bottom: 5px; }
        .coach-info p { color: #888; text-transform: uppercase; font-size: 14px; letter-spacing: 2px; margin-bottom: 20px; }

        /* WHATSAPP DÜYMƏLƏRİ */
        .btn-ws { 
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 15px; border-radius: 8px; text-decoration: none; font-weight: bold;
            color: white; transition: 0.3s; font-size: 14px; text-transform: uppercase;
        }
        .ws-nazir { background: #25d366; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.2); }
        .ws-arif { background: #128c7e; box-shadow: 0 4px 15px rgba(18, 140, 126, 0.2); }
        .btn-ws:hover { opacity: 0.9; transform: scale(1.02); }

        /* DASHBOARD - SADƏ VƏ SƏLİQƏLİ */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .tool-card { background: var(--gray); padding: 25px; border-radius: 12px; border: 1px solid #222; }
        .tool-card h3 { color: var(--red); font-size: 20px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        input, select { 
            width: 100%; padding: 12px; margin-bottom: 15px; background: #000; 
            border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; 
        }
        .btn-action { 
            width: 100%; padding: 12px; background: #222; color: white; border: none; 
            border-radius: 5px; cursor: pointer; font-family: 'Oswald'; font-weight: bold; 
        }
        .btn-action:hover { background: var(--red); }

        .res-box { margin-top: 15px; padding: 15px; background: #050505; border-radius: 5px; font-size: 14px; color: #ccc; min-height: 20px; }

        .timer-val { font-size: 40px; font-weight: bold; text-align: center; color: var(--red); margin: 10px 0; font-family: 'Oswald'; }

        footer { text-align: center; padding: 50px; color: #333; font-size: 11px; text-transform: uppercase; letter-spacing: 2px; }

        @media (max-width: 768px) { .img-container { height: 500px; } }
    </style>
</head>
<body>

<header>
    <h1>NB <span>FITNESS</span> ACADEMY</h1>
</header>

<div class="container">
    
    <div class="coach-section">
        <div class="coach-card">
            <div class="img-container">
                <img src="nazir.jpg" class="coach-img" alt="Nazir İbrahimov">
            </div>
            <div class="coach-info">
                <h2>NAZİR İBRAHİMOV</h2>
                <p>Güc və Kondisiya Məşqçisi</p>
                <a href="https://wa.me/994702946819?text=Salam%20Nazir%20bəy,%20məşqlərə%20başlamaq%20istəyirəm." class="btn-ws ws-nazir" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20"> Nazirə Yaz
                </a>
            </div>
        </div>

        <div class="coach-card">
            <div class="img-container">
                <img src="arif.jpg" class="coach-img" alt="Arif Bağırov">
            </div>
            <div class="coach-info">
                <h2>ARİF BAĞIROV</h2>
                <p>Bodybuilding və Estetika</p>
                <a href="https://wa.me/994514102531?text=Salam%20Arif%20bəy,%20məşqlərə%20başlamaq%20istəyirəm." class="btn-ws ws-arif" target="_blank">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" width="20"> Arifə Yaz
                </a>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div class="tool-card">
            <h3>📈 3 AYLIQ TƏXMİN</h3>
            <input type="number" id="arm" placeholder="Cari qol ölçüsü (sm)">
            <button onclick="predict()" class="btn-action">HESABLA</button>
            <div id="p-res" class="res-box"></div>
        </div>

        <div class="tool-card">
            <h3>🍗 PROTEİN REHBERİ</h3>
            <input type="number" id="weight" placeholder="Çəkiniz (kq)">
            <button onclick="calcP()" class="btn-action">HESABLA</button>
            <div id="pr-res" class="res-box"></div>
        </div>

        <div class="tool-card">
            <h3>📱 FASİLƏ TEYMERİ</h3>
            <div class="timer-val" id="clock">01:00</div>
            <button onclick="startT()" class="btn-action">BAŞLAT (60 SAN)</button>
        </div>

        <div class="tool-card">
            <h3>🧬 GENETİK TEST</h3>
            <select id="bone">
                <option value="1">Nazik biləklər</option>
                <option value="2">Normal biləklər</option>
                <option value="3">Geniş biləklər</option>
            </select>
            <button onclick="checkB()" class="btn-action">ANALİZ ET</button>
            <div id="b-res" class="res-box"></div>
        </div>
    </div>

</div>

<script>
    function predict() {
        let a = parseFloat(document.getElementById('arm').value);
        if(a) document.getElementById('p-res').innerHTML = `Nazir ilə 3 aya hədəf: <b>${(a+3.5).toFixed(1)} sm</b>`;
    }

    function calcP() {
        let w = document.getElementById('weight').value;
        if(w) document.getElementById('pr-res').innerHTML = `Gündəlik: <b>${w*2}q Protein</b>`;
    }

    let tl = 60, tid;
    function startT() {
        clearInterval(tid); tl = 60;
        tid = setInterval(() => {
            tl--;
            document.getElementById('clock').innerText = `00:${tl < 10 ? '0'+tl : tl}`;
            if(tl <= 0) { clearInterval(tid); alert("Vaxt bitdi!"); }
        }, 1000);
    }

    function checkB() {
        let b = document.getElementById('bone').value;
        document.getElementById('b-res').innerText = b == "1" ? "Ektomorf (Kütlə lazımdır)" : "Mezomorf / Endomorf";
    }
</script>

<footer>
    NB FITNESS ACADEMY | BAKU 2026 | ALL RIGHTS RESERVED
</footer>

</body>
</html>
