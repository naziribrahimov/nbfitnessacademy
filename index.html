<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NB FITNESS | Nazir & Arif</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #ff003c; --blue: #00f7ff; --dark: #000000; --card: #111; }
        body { background: var(--dark); color: white; font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; }

        /* HEADER */
        header { text-align: center; padding: 30px; border-bottom: 2px solid var(--red); background: #000; }
        header h1 { font-family: 'Orbitron'; font-size: 30px; margin: 0; letter-spacing: 3px; }
        header h1 span { color: var(--red); }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* MƏŞQÇİLƏR - TAM GÖRÜNÜŞ VƏ ADLAR */
        .coach-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 50px; }
        .coach-card { background: #0a0a0a; border: 1px solid #222; border-radius: 15px; overflow: hidden; position: relative; }
        
        /* Şəklin tam görünməsi üçün */
        .img-box { width: 100%; height: 700px; overflow: hidden; display: flex; align-items: flex-start; justify-content: center; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; object-position: top; }

        .info-overlay { 
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px; 
            background: linear-gradient(transparent, rgba(0,0,0,0.95) 80%); box-sizing: border-box; 
        }
        .role { font-family: 'Orbitron'; font-size: 12px; letter-spacing: 3px; margin-bottom: 5px; }
        .name { font-family: 'Orbitron'; font-size: 35px; font-weight: 900; margin: 0; line-height: 1; text-transform: uppercase; }
        
        .ws-btn { 
            display: inline-flex; align-items: center; gap: 8px; margin-top: 15px; 
            padding: 12px 25px; text-decoration: none; font-family: 'Orbitron'; 
            font-weight: bold; border-radius: 5px; font-size: 12px; transition: 0.3s;
        }
        .n-btn { background: var(--red); color: white; }
        .a-btn { background: var(--blue); color: black; }

        /* DASHBOARD TOOLS */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .tool-card { background: var(--card); border: 1px solid #222; border-radius: 12px; padding: 25px; }
        .tool-card h3 { font-family: 'Orbitron'; font-size: 15px; color: #ffbd39; border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 0; }

        input, select { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #333; color: white; border-radius: 5px; box-sizing: border-box; }
        .btn-act { width: 100%; padding: 14px; border: none; border-radius: 5px; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; background: #222; color: white; transition: 0.3s; }
        .btn-act:hover { background: var(--red); }

        .res-box { margin-top: 15px; padding: 12px; background: rgba(0,0,0,0.5); border-radius: 5px; font-size: 14px; min-height: 20px; border-left: 3px solid var(--red); }

        .timer-val { font-size: 40px; font-family: 'Orbitron'; color: var(--red); text-align: center; margin: 10px 0; }

        footer { text-align: center; padding: 40px; color: #333; font-family: 'Orbitron'; font-size: 10px; }
    </style>
</head>
<body>

<header>
    <h1>NB <span>FITNESS</span> ACADEMY</h1>
</header>

<div class="container">
    
    <div class="coach-grid">
        <div class="coach-card">
            <div class="img-box">
                <img src="nazir.jpg" alt="Nazir İbrahimov">
            </div>
            <div class="info-overlay">
                <div class="role" style="color: var(--red);">STRENGTH COACH</div>
                <h2 class="name">NAZİR İBRAHİMOV</h2>
                <a href="https://wa.me/994702946819" class="ws-btn n-btn" target="_blank">WHATSAPP: 294-68-19</a>
            </div>
        </div>

        <div class="coach-card">
            <div class="img-box">
                <img src="arif.jpg" alt="Arif Bağırov">
            </div>
            <div class="info-overlay">
                <div class="role" style="color: var(--blue);">AESTHETIC PRO</div>
                <h2 class="name">ARİF BAĞIROV</h2>
                <a href="https://wa.me/994514102531" class="ws-btn a-btn" target="_blank">WHATSAPP: 410-25-31</a>
            </div>
        </div>
    </div>

    <div class="dashboard">
        <div class="tool-card">
            <h3>📈 3 AYLIQ İNKİŞAF</h3>
            <input type="number" id="arm" placeholder="Qol ölçüsü (sm)">
            <button onclick="predict()" class="btn-act">HESABLA</button>
            <div id="p-res" class="res-box">Nəticə bura çıxacaq...</div>
        </div>

        <div class="tool-card">
            <h3>🔍 ƏZƏLƏ SKANERİ</h3>
            <select id="ms">
                <option value="sinə">SİNƏ</option>
                <option value="ayaq">AYAQ</option>
                <option value="qol">QOL</option>
                <option value="kürək">KÜRƏK</option>
            </select>
            <button onclick="scan()" class="btn-act">SKAN ET</button>
            <div id="m-res" class="res-box">Metodu gör...</div>
        </div>

        <div class="tool-card">
            <h3>📱 FASİLƏ TEYMERİ</h3>
            <div class="timer-val" id="time">01:00</div>
            <button onclick="startT()" class="btn-act">BAŞLAT (60s)</button>
        </div>

        <div class="tool-card">
            <h3>🍗 PROTEİN REHBERİ</h3>
            <input type="number" id="w" placeholder="Çəkiniz (kq)">
            <button onclick="calcP()" class="btn-act">HESABLA</button>
            <div id="pr-res" class="res-box">Ehtiyac...</div>
        </div>
    </div>

</div>

<script>
    function predict() {
        let a = parseFloat(document.getElementById('arm').value);
        if(a) document.getElementById('p-res').innerHTML = `3 aya hədəf: <b>${(a+3.5).toFixed(1)} sm</b>`;
    }

    function scan() {
        const d = { 'sinə': 'Bench Press: Partlayışla qaldırın.', 'ayaq': 'Squat: Tam aşağı oturun.', 'qol': 'Curl: Yuxarıda sıxın.', 'kürək': 'Deadlift: Beli düz saxlayın.' };
        document.getElementById('m-res').innerHTML = d[document.getElementById('ms').value];
    }

    function calcP() {
        let w = document.getElementById('w').value;
        if(w) document.getElementById('pr-res').innerHTML = `Gündəlik: <b>${w*2}q Protein</b>`;
    }

    let tl = 60, ti;
    function startT() {
        clearInterval(ti); tl = 60;
        ti = setInterval(() => {
            tl--;
            document.getElementById('time').innerText = `00:${tl < 10 ? '0'+tl : tl}`;
            if(tl <= 0) { clearInterval(ti); alert("Vaxt bitdi!"); }
        }, 1000);
    }
</script>

<footer>
    NB FITNESS ACADEMY | OFFICIAL v13.0 | 2026
</footer>

</body>
</html>
